<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 브라우저 & 에이전트 클래스</title>
  
  <!-- Font Setup: Outfit (Numbers/English) & Inter & Noto Sans KR -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Canvas Confetti for celebrations -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <style>
    :root {
      --bg-dark: #090d16;
      --bg-card: rgba(17, 24, 39, 0.7);
      --bg-card-hover: rgba(31, 41, 55, 0.8);
      --border-color: rgba(255, 255, 255, 0.08);
      
      --color-primary: #38bdf8; /* Cyan */
      --color-secondary: #a855f7; /* Purple */
      --color-accent: #f43f5e; /* Rose */
      --color-success: #10b981; /* Emerald */
      
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --font-english: 'Outfit', 'Inter', sans-serif;
      --font-korean: 'Noto Sans KR', sans-serif;
      
      --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: var(--font-korean);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    /* Background Neon Orbs */
    .bg-orbs {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      overflow: hidden;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(150px);
      opacity: 0.15;
    }

    .orb-1 {
      top: -10%;
      left: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, var(--color-primary) 0%, transparent 70%);
      animation: orbFloat 25s infinite alternate;
    }

    .orb-2 {
      bottom: -10%;
      right: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, var(--color-secondary) 0%, transparent 70%);
      animation: orbFloat 30s infinite alternate-reverse;
    }

    @keyframes orbFloat {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(5%, 5%) scale(1.1); }
    }

    /* Grid Overlay */
    .bg-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: -1;
      pointer-events: none;
    }

    /* Presentation Layout */
    .deck-container {
      flex: 1;
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px 20px 90px 20px; /* Pad bottom for fixed toolbar */
      overflow: hidden;
    }

    .slide-wrapper {
      position: relative;
      width: min(100%, calc((100vh - 160px) * 16 / 9));
      max-width: 1280px;
      aspect-ratio: 16 / 9;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
      border: 1px solid var(--border-color);
      border-radius: 20px;
      background: rgba(17, 24, 39, 0.4);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    /* Individual Slide Structure */
    .slide {
      grid-column: 1;
      grid-row: 1;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      z-index: 1;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    .slide.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      z-index: 2;
    }

    .slide-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 20px;
    }

    /* Sidebar Drawer */
    .sidebar {
      position: fixed;
      top: 0;
      right: -380px;
      width: 380px;
      height: 100%;
      background: rgba(9, 13, 22, 0.95);
      border-left: 1px solid var(--border-color);
      box-shadow: -10px 0 30px rgba(0,0,0,0.5);
      z-index: 1000;
      transition: var(--transition-smooth);
      backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
    }

    .sidebar.open {
      right: 0;
    }

    .sidebar-header {
      padding: 30px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-header h3 {
      font-size: 1.2rem;
      font-weight: 800;
      background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sidebar-close {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 1.5rem;
      cursor: pointer;
      transition: var(--transition-smooth);
    }

    .sidebar-close:hover {
      color: #ffffff;
    }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Custom Scrollbar for Sidebar */
    .sidebar-list::-webkit-scrollbar {
      width: 6px;
    }
    .sidebar-list::-webkit-scrollbar-track {
      background: transparent;
    }
    .sidebar-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }
    .sidebar-list::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .sidebar-item {
      padding: 14px 20px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      cursor: pointer;
      transition: var(--transition-smooth);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-item:hover {
      background: rgba(56, 189, 248, 0.05);
      border-color: rgba(56, 189, 248, 0.2);
    }

    .sidebar-item.active {
      background: linear-gradient(90deg, rgba(56, 189, 248, 0.15), rgba(168, 85, 247, 0.15));
      border-color: rgba(56, 189, 248, 0.4);
    }

    .sidebar-item span {
      font-size: 0.92rem;
      font-weight: 500;
    }

    .sidebar-item.active span {
      color: #ffffff;
      font-weight: 700;
    }

    .sidebar-badge {
      font-family: var(--font-english);
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--color-primary);
      background: rgba(56, 189, 248, 0.1);
      padding: 2px 8px;
      border-radius: 6px;
    }

    /* Floating Presenter Toolbar */
    .presenter-toolbar {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(17, 24, 39, 0.6);
      border: 1px solid var(--border-color);
      padding: 12px 24px;
      border-radius: 99px;
      display: flex;
      align-items: center;
      gap: 15px;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      z-index: 900;
    }

    .toolbar-btn {
      background: transparent;
      border: none;
      color: var(--text-main);
      padding: 8px 16px;
      border-radius: 99px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: var(--transition-smooth);
    }

    .toolbar-btn:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .toolbar-btn.disabled {
      opacity: 0.3;
      pointer-events: none;
    }

    #confetti-btn {
      color: var(--color-accent);
    }
    #confetti-btn:hover {
      background: rgba(244, 63, 94, 0.1);
    }

    /* Progress Bar */
    .progress-bar-container {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.05);
      z-index: 900;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
      transition: width 0.3s ease;
    }

    /* Directional transitions */
    .slide-in-right {
      animation: slideInRight 0.4s ease forwards;
    }

    .slide-in-left {
      animation: slideInLeft 0.4s ease forwards;
    }

    @keyframes slideInRight {
      from { transform: translateX(5%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes slideInLeft {
      from { transform: translateX(-5%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Background decorations -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>
  <div class="bg-grid"></div>

  <!-- Deck Container -->
  <main class="deck-container">
    <div class="slide-wrapper" id="slide-wrapper">
      <!-- Dynamic slides will be generated here -->
    </div>
  </main>

  <!-- Sidebar Drawer -->
  <aside class="sidebar" id="sidebar" aria-label="슬라이드 네비게이션">
    <div class="sidebar-header">
      <h3>AI 브라우저 & 에이전트</h3>
      <button class="sidebar-close" id="sidebar-close-btn" aria-label="닫기">&times;</button>
    </div>
    <div class="sidebar-list" id="sidebar-list">
      <!-- Sidebar items will be generated here -->
    </div>
  </aside>

  <!-- Progress Bar Container -->
  <div class="progress-bar-container">
    <div class="progress-bar-fill" id="progress-bar"></div>
  </div>

  <!-- Float Toolbar -->
  <footer class="presenter-toolbar">
    <button class="toolbar-btn" id="sidebar-toggle-btn"><i class="fa-solid fa-list-ul"></i> 슬라이드 목록 (S)</button>
    <button class="toolbar-btn" id="prev-btn"><i class="fa-solid fa-chevron-left"></i> 이전 (←)</button>
    <button class="toolbar-btn" id="next-btn">다음 (→) <i class="fa-solid fa-chevron-right"></i></button>
    <button class="toolbar-btn" id="confetti-btn"><i class="fa-solid fa-wand-magic-sparkles"></i> 폭죽 🎉</button>
  </footer>

  <script>
    const totalSlides = 44;
    const wrapper = document.getElementById('slide-wrapper');
    const sidebarList = document.getElementById('sidebar-list');

    // Section Titles from PDF to make sidebar search friendly
    const sectionNames = {
      1: "오프닝 및 안내",
      2: "AI 기술의 발전 단계",
      5: "AI 브라우저와 웹 에이전트 개요",
      12: "Comet AI 브라우저 소개",
      20: "웹 크롤러 vs 서버 방어 기술",
      29: "웹 자동화 우회 기법 실습",
      38: "AI 에이전트 보안 및 마무리"
    };

    // Generate Slides
    for (let i = 1; i <= totalSlides; i++) {
      const slide = document.createElement('section');
      slide.className = 'slide' + (i === 1 ? ' active' : '');
      
      const padded = String(i).padStart(2, '0');
      const img = document.createElement('img');
      img.src = `./ai-browser-ppt/slide-${padded}.png`;
      img.alt = `Slide ${i}`;
      img.className = 'slide-image';
      img.loading = i > 3 ? 'lazy' : 'eager';
      
      slide.appendChild(img);
      wrapper.appendChild(slide);
    }

    const slides = document.querySelectorAll('.slide');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const progressBar = document.getElementById('progress-bar');
    const sidebar = document.getElementById('sidebar');
    const sidebarToggleBtn = document.getElementById('sidebar-toggle-btn');
    const sidebarCloseBtn = document.getElementById('sidebar-close-btn');

    let currentSlideIdx = 0;

    // Load slide index from URL Hash
    if (window.location.hash) {
      const hashIdx = parseInt(window.location.hash.replace('#slide-', '')) - 1;
      if (!isNaN(hashIdx) && hashIdx >= 0 && hashIdx < totalSlides) {
        currentSlideIdx = hashIdx;
      }
    }

    function updateSlides(direction = 'forward') {
      slides.forEach((slide, idx) => {
        slide.classList.remove('active', 'slide-in-right', 'slide-in-left');
        if (idx === currentSlideIdx) {
          slide.classList.add('active');
          if (direction === 'forward') {
            slide.classList.add('slide-in-right');
          } else if (direction === 'backward') {
            slide.classList.add('slide-in-left');
          }
        }
      });

      // Update URL hash
      window.location.hash = `slide-${currentSlideIdx + 1}`;

      // Update Toolbar Buttons
      prevBtn.classList.toggle('disabled', currentSlideIdx === 0);
      nextBtn.classList.toggle('disabled', currentSlideIdx === totalSlides - 1);

      // Update Progress Bar
      const progressPercent = ((currentSlideIdx) / (totalSlides - 1)) * 100;
      progressBar.style.width = `${progressPercent}%`;

      // Update Sidebar Active state
      const sidebarItems = sidebarList.querySelectorAll('.sidebar-item');
      sidebarItems.forEach((item, idx) => {
        item.classList.toggle('active', idx === currentSlideIdx);
      });

      // Close sidebar on navigation
      sidebar.classList.remove('open');
    }

    function nextSlide() {
      if (currentSlideIdx < totalSlides - 1) {
        currentSlideIdx++;
        updateSlides('forward');
      }
    }

    function prevSlide() {
      if (currentSlideIdx > 0) {
        currentSlideIdx--;
        updateSlides('backward');
      }
    }

    // Key listeners
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
        nextSlide();
      } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
        prevSlide();
      } else if (e.key.toLowerCase() === 's') {
        toggleSidebar();
      }
    });

    // Button clicks
    prevBtn.addEventListener('click', () => {
      if (!prevBtn.classList.contains('disabled')) prevSlide();
    });
    nextBtn.addEventListener('click', () => {
      if (!nextBtn.classList.contains('disabled')) nextSlide();
    });

    // Sidebar Menu Logic
    function toggleSidebar() {
      sidebar.classList.toggle('open');
    }

    sidebarToggleBtn.addEventListener('click', toggleSidebar);
    sidebarCloseBtn.addEventListener('click', () => sidebar.classList.remove('open'));

    // Populate Sidebar
    let activeSectionName = "소개";
    for (let idx = 0; idx < totalSlides; idx++) {
      if (sectionNames[idx + 1]) {
        activeSectionName = sectionNames[idx + 1];
      }

      const item = document.createElement('div');
      item.className = 'sidebar-item';
      if (idx === currentSlideIdx) item.classList.add('active');

      item.innerHTML = `
        <span>슬라이드 ${idx + 1}</span>
        <span class="sidebar-badge">${activeSectionName}</span>
      `;

      item.addEventListener('click', () => {
        const direction = idx > currentSlideIdx ? 'forward' : 'backward';
        currentSlideIdx = idx;
        updateSlides(direction);
        sidebar.classList.remove('open');
      });

      sidebarList.appendChild(item);
    }

    // Confetti Button
    document.getElementById('confetti-btn').addEventListener('click', () => {
      confetti({
        particleCount: 100,
        spread: 70,
        origin: { y: 0.8 }
      });
    });

    // Initialize
    updateSlides();
  </script>
</body>
</html>
